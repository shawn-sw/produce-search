<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Produce Search 离线查询</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Produce Search</h1>
      <p>输入编号、PLU、名称或产地查询。支持离线使用。</p>
    </header>

    <section class="search-panel">
      <input id="searchInput" type="search" placeholder="例如：1370820 / 82 / ginger / apple" autocomplete="off" autofocus />
      <div class="filters">
        <button class="chip active" data-filter="all">全部</button>
        <button class="chip" data-filter="Vegetable">蔬菜</button>
        <button class="chip" data-filter="Fruit">水果</button>
      </div>
      <div class="meta">
        <span id="countText"></span>
        <button id="clearBtn">清空</button>
      </div>
    </section>

    <section id="results" class="results"></section>
  </main>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
